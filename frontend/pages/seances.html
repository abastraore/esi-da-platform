<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Séances — ESI DA Platform</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="main-wrapper">
  <div class="page-content">

    <div class="filter-bar">
      <input type="search" class="search-input" id="search" placeholder="🔍 Rechercher une séance...">
    </div>

    <div class="section-card">
      <div class="section-header">
        <span class="section-title">Liste des séances</span>
        <span class="badge badge-gray" id="seances-count">—</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cours</th><th>Classe</th><th>Date</th>
              <th>Horaire</th><th>Salle</th><th>Type</th><th>Enseignant</th>
            </tr>
          </thead>
          <tbody id="seances-tbody">
            <tr class="loading-row"><td colspan="7"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/seances.js"></script>
<script>buildLayout('Séances', 'seances.html');</script>
</body>
</html>
