<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Statistiques — ESI DA Platform</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .av-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:12px; }
    .avancement-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-md); padding:16px;
    }
    .av-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .av-cours  { font-weight:600; font-size:0.85rem; color:var(--text-primary); }
    .av-pct    { font-family:var(--font-mono); font-size:1.2rem; font-weight:700; }
    .av-meta   { font-size:0.75rem; color:var(--text-secondary); margin-top:6px; }
  </style>
</head>
<body>
<div class="main-wrapper">
  <div class="page-content">

    <!-- Stats globales -->
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card green">
        <div class="stat-label">Avancement moyen</div>
        <div class="stat-value" id="s-moy">—</div>
        <div class="stat-sub">sur l'ensemble des cours</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Cours terminés</div>
        <div class="stat-value" id="s-termines">—</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label">En cours</div>
        <div class="stat-value" id="s-encours">—</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Non démarrés</div>
        <div class="stat-value" id="s-zero">—</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h2 style="font-size:0.9rem;font-weight:600">Avancement par cours</h2>
      <button class="btn btn-primary btn-sm" onclick="openNewAvModal()">+ Mettre à jour</button>
    </div>

    <div class="av-grid" id="av-grid">
      <div style="text-align:center;padding:30px;color:var(--text-muted)"><span class="spinner"></span></div>
    </div>

  </div>
</div>

<!-- Modal avancement -->
<div class="modal-overlay" id="modal-av">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-av-title">Mettre à jour l'avancement</span>
      <button class="modal-close" onclick="closeModal('modal-av')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="av-id">
      <div class="form-group">
        <label class="form-label">Cours *</label>
        <select class="form-control" id="av-cours">
          <option value="">— Sélectionner un cours —</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Heures prévues *</label>
          <input type="number" class="form-control" id="av-prevues" min="1" placeholder="60">
        </div>
        <div class="form-group">
          <label class="form-label">Heures réalisées *</label>
          <input type="number" class="form-control" id="av-realisees" min="0" placeholder="30">
        </div>
      </div>
      <div id="av-preview" style="text-align:center;font-size:0.85rem;color:var(--accent-cyan);margin-top:4px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-av')">Annuler</button>
      <button class="btn btn-primary" onclick="saveAv()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/avancement.js"></script>
<script>buildLayout('Statistiques', 'avancement.html');</script>
</body>
</html>
